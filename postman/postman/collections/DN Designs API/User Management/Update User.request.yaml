$kind: http-request
description: Update user details (Admin only)
url: "{{base_url}}/api/users/{{created_user_id}}"
method: PUT
headers:
  Authorization: Bearer {{admin_token}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
        "name": "Updated Name",
        "role": "editor",
        "isActive": true
    }
order: 4000
