$kind: http-request
description: Create a new tag (Admin/Editor only)
url: "{{base_url}}/api/tags"
method: POST
headers:
  Authorization: Bearer {{admin_token}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
        "name": "Next.js",
        "slug": "nextjs"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
          const response = pm.response.json();
          pm.environment.set("tag_id", response.data._id);
      }
    language: text/javascript
order: 2000
