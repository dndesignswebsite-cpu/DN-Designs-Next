$kind: http-request
description: Get all contact submissions (Admin only)
url: "{{base_url}}/api/contact?page=1&limit=10"
method: GET
headers:
  Authorization: Bearer {{admin_token}}
queryParams:
  - key: page
    value: "1"
  - key: limit
    value: "10"
  - key: status
    value: new
    disabled: true
  - key: search
    value: jane
    disabled: true
order: 2000
