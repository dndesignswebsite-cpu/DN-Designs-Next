$kind: http-request
description: Update current user profile
url: "{{base_url}}/api/auth/update-profile"
method: PUT
headers:
  Authorization: Bearer {{auth_token}}
body:
  type: formdata
  content:
    - type: text
      key: name
      value: John Updated
    - type: text
      key: email
      value: john.updated@example.com
    - type: file
      key: avatar
      src: []
order: 5000
