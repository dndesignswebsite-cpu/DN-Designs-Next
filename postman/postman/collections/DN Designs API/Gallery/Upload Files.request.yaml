$kind: http-request
description: Upload one or more files to a specific folder (Admin/Editor only)
url: "{{base_url}}/api/gallery"
method: POST
headers:
  Authorization: Bearer {{admin_token}}
body:
  type: formdata
  content:
    - type: file
      key: file
      src: []
    - type: text
      key: folder
      value: images
order: 3000
