$kind: http-request
description: Add multiple images to blog post (Admin only)
url: "{{base_url}}/api/blogs/{{blog_id}}/images"
method: POST
headers:
  Authorization: Bearer {{admin_token}}
body:
  type: formdata
  content:
    - type: file
      key: images
      src: []
    - type: file
      key: images
      src: []
    - type: text
      key: captions
      value: '["Caption 1", "Caption 2"]'
order: 6000
